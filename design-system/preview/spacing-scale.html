<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="label-eyebrow" style="margin-bottom:14px;">Spacing scale · 4px base</div>
  <div style="display:flex; align-items:flex-end; gap:8px;">
    <!-- visualize each step -->
    <div class="col" style="align-items:center;"><div style="width:4px; height:4px; background:var(--mission-navy-900);"></div><div class="mono" style="font-size:10px; margin-top:6px;">1</div><div class="mono" style="font-size:9px; color:var(--slate-500);">4</div></div>
    <div class="col" style="align-items:center;"><div style="width:8px; height:8px; background:var(--mission-navy-900);"></div><div class="mono" style="font-size:10px; margin-top:6px;">2</div><div class="mono" style="font-size:9px; color:var(--slate-500);">8</div></div>
    <div class="col" style="align-items:center;"><div style="width:12px; height:12px; background:var(--mission-navy-900);"></div><div class="mono" style="font-size:10px; margin-top:6px;">3</div><div class="mono" style="font-size:9px; color:var(--slate-500);">12</div></div>
    <div class="col" style="align-items:center;"><div style="width:16px; height:16px; background:var(--mission-navy-900);"></div><div class="mono" style="font-size:10px; margin-top:6px;">4</div><div class="mono" style="font-size:9px; color:var(--slate-500);">16</div></div>
    <div class="col" style="align-items:center;"><div style="width:20px; height:20px; background:var(--mission-navy-900);"></div><div class="mono" style="font-size:10px; margin-top:6px;">5</div><div class="mono" style="font-size:9px; color:var(--slate-500);">20</div></div>
    <div class="col" style="align-items:center;"><div style="width:24px; height:24px; background:var(--mission-navy-900);"></div><div class="mono" style="font-size:10px; margin-top:6px;">6</div><div class="mono" style="font-size:9px; color:var(--slate-500);">24</div></div>
    <div class="col" style="align-items:center;"><div style="width:32px; height:32px; background:var(--mission-navy-900);"></div><div class="mono" style="font-size:10px; margin-top:6px;">8</div><div class="mono" style="font-size:9px; color:var(--slate-500);">32</div></div>
    <div class="col" style="align-items:center;"><div style="width:40px; height:40px; background:var(--mission-navy-900);"></div><div class="mono" style="font-size:10px; margin-top:6px;">10</div><div class="mono" style="font-size:9px; color:var(--slate-500);">40</div></div>
    <div class="col" style="align-items:center;"><div style="width:48px; height:48px; background:var(--mission-navy-900);"></div><div class="mono" style="font-size:10px; margin-top:6px;">12</div><div class="mono" style="font-size:9px; color:var(--slate-500);">48</div></div>
    <div class="col" style="align-items:center;"><div style="width:64px; height:64px; background:var(--mission-navy-900);"></div><div class="mono" style="font-size:10px; margin-top:6px;">16</div><div class="mono" style="font-size:9px; color:var(--slate-500);">64</div></div>
    <div class="col" style="align-items:center;"><div style="width:80px; height:80px; background:var(--mission-navy-900);"></div><div class="mono" style="font-size:10px; margin-top:6px;">20</div><div class="mono" style="font-size:9px; color:var(--slate-500);">80</div></div>
  </div>
</div></body></html>
