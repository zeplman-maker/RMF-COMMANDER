<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="background:#F8FAFC;"><div class="card">
  <div class="label-eyebrow" style="margin-bottom:18px;">Elevation — flat by default</div>
  <div style="display:flex; gap:18px; align-items:flex-end;">
    <div class="col" style="align-items:center;">
      <div style="width:90px; height:64px; background:#fff; border:1px solid var(--slate-300); border-radius:6px;"></div>
      <div class="mono" style="font-size:11px; margin-top:8px;">none</div>
      <div class="mono" style="font-size:10px; color:var(--slate-500);">borders only</div>
    </div>
    <div class="col" style="align-items:center;">
      <div style="width:90px; height:64px; background:#fff; border:1px solid var(--slate-200); border-radius:6px; box-shadow:0 1px 2px 0 rgba(15,26,61,0.06);"></div>
      <div class="mono" style="font-size:11px; margin-top:8px;">xs</div>
      <div class="mono" style="font-size:10px; color:var(--slate-500);">cards default</div>
    </div>
    <div class="col" style="align-items:center;">
      <div style="width:90px; height:64px; background:#fff; border:1px solid var(--slate-200); border-radius:6px; box-shadow:0 1px 3px 0 rgba(15,26,61,0.08), 0 1px 2px -1px rgba(15,26,61,0.06);"></div>
      <div class="mono" style="font-size:11px; margin-top:8px;">sm</div>
      <div class="mono" style="font-size:10px; color:var(--slate-500);">hover</div>
    </div>
    <div class="col" style="align-items:center;">
      <div style="width:90px; height:64px; background:#fff; border:1px solid var(--slate-200); border-radius:6px; box-shadow:0 4px 8px -2px rgba(15,26,61,0.10), 0 2px 4px -2px rgba(15,26,61,0.06);"></div>
      <div class="mono" style="font-size:11px; margin-top:8px;">md</div>
      <div class="mono" style="font-size:10px; color:var(--slate-500);">menus</div>
    </div>
    <div class="col" style="align-items:center;">
      <div style="width:90px; height:64px; background:#fff; border:1px solid var(--slate-200); border-radius:6px; box-shadow:0 12px 24px -6px rgba(15,26,61,0.14), 0 4px 8px -4px rgba(15,26,61,0.08);"></div>
      <div class="mono" style="font-size:11px; margin-top:8px;">lg</div>
      <div class="mono" style="font-size:10px; color:var(--slate-500);">modals</div>
    </div>
    <div class="col" style="align-items:center;">
      <div style="width:90px; height:64px; background:#0F1A3D; border-radius:6px; box-shadow:0 0 0 1px rgba(74,144,217,0.4), 0 0 24px -6px rgba(74,144,217,0.6);"></div>
      <div class="mono" style="font-size:11px; margin-top:8px;">cyber-glow</div>
      <div class="mono" style="font-size:10px; color:var(--slate-500);">on navy only</div>
    </div>
  </div>
</div></body></html>
