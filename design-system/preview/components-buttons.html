<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .head { display:flex; align-items:baseline; gap:10px; margin-bottom:6px; }
  .head .h { font-weight:700; font-size:14px; color:var(--fg-1); }
  .head .sub { font-family:var(--font-mono); font-size:10.5px; color:var(--fg-3); letter-spacing:.06em; text-transform:uppercase; }

  .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .grp { display:flex; flex-direction:column; gap:8px; }
  .grp .label { font-family:var(--font-mono); font-size:10px; color:var(--fg-3); letter-spacing:.06em; text-transform:uppercase; }

  /* Buttons */
  .btn {
    font-family: var(--font-sans);
    font-weight: 600;
    font-size: 13.5px;
    line-height: 1;
    letter-spacing: -0.005em;
    padding: 10px 16px;
    border-radius: 6px;
    border: 1px solid transparent;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: all 120ms cubic-bezier(0.4,0,0.2,1);
  }
  .btn-primary { background: var(--cyan-400); color: var(--navy-900); border-color: var(--cyan-400); }
  .btn-primary.hover { background: var(--cyan-300); border-color: var(--cyan-300); }
  .btn-primary.press { background: var(--cyan-600); border-color: var(--cyan-600); transform: scale(0.98); }

  .btn-secondary { background: transparent; color: var(--fg-1); border-color: rgba(255,255,255,0.18); }
  .btn-secondary.hover { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.28); }

  .btn-ghost { background: transparent; color: var(--cyan-400); border-color: transparent; padding-left: 8px; padding-right: 8px; }

  .btn-danger { background: var(--critical-500); color: #fff; border-color: var(--critical-500); }
  .btn-disabled { background: var(--cyan-400); color: var(--navy-900); border-color: var(--cyan-400); opacity:.4; cursor: not-allowed; }
  .btn-focus { background: var(--cyan-400); color: var(--navy-900); border-color: var(--cyan-400); outline:2px solid var(--cyan-400); outline-offset:2px; }

  .btn-sm { padding: 7px 12px; font-size: 12.5px; }
  .btn-lg { padding: 14px 22px; font-size: 15px; }

  /* Mini lucide stand-ins */
  .ico { width:14px; height:14px; flex-shrink:0; }
</style></head>
<body>
<div class="card">
  <div class="head"><div class="h">Buttons</div><div class="sub">PRIMARY · SECONDARY · GHOST · DANGER</div></div>

  <div class="grp">
    <div class="label">Primary · states</div>
    <div class="row">
      <button class="btn btn-primary">Approve draft</button>
      <button class="btn btn-primary hover">Approve draft</button>
      <button class="btn btn-primary press">Approve draft</button>
      <button class="btn btn-focus">Approve draft</button>
      <button class="btn btn-disabled">Approve draft</button>
    </div>
  </div>

  <div class="grp">
    <div class="label">Secondary · Ghost · Danger</div>
    <div class="row">
      <button class="btn btn-secondary">View source</button>
      <button class="btn btn-secondary hover">View source</button>
      <button class="btn btn-ghost">Cancel</button>
      <button class="btn btn-danger">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
        Delete POA&amp;M
      </button>
    </div>
  </div>

  <div class="grp">
    <div class="label">Sizes</div>
    <div class="row">
      <button class="btn btn-primary btn-sm">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m12 3-1.9 5.8a2 2 0 0 1-1.3 1.3L3 12l5.8 1.9a2 2 0 0 1 1.3 1.3L12 21l1.9-5.8a2 2 0 0 1 1.3-1.3L21 12l-5.8-1.9a2 2 0 0 1-1.3-1.3L12 3Z"/></svg>
        Draft
      </button>
      <button class="btn btn-primary">Draft control statement</button>
      <button class="btn btn-primary btn-lg">Submit for ISSM approval</button>
    </div>
  </div>
</div>
</body></html>
