<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .head { display:flex; align-items:baseline; gap:10px; margin-bottom:6px; }
  .head .h { font-weight:700; font-size:14px; color:var(--fg-1); }
  .head .sub { font-family:var(--font-mono); font-size:10.5px; color:var(--fg-3); letter-spacing:.06em; text-transform:uppercase; }

  .grp { display:flex; flex-direction:column; gap:8px; }
  .grp .label { font-family:var(--font-mono); font-size:10px; color:var(--fg-3); letter-spacing:.06em; text-transform:uppercase; }
  .row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }

  .badge {
    font-family: var(--font-mono);
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 4px 9px;
    border-radius: 999px;
    display:inline-flex;
    align-items:center;
    gap: 6px;
    line-height: 1;
    border: 1px solid transparent;
  }
  .badge::before {
    content:'';
    width:6px; height:6px; border-radius:50%;
    background: currentColor;
    flex-shrink:0;
  }
  .badge.no-dot::before { display:none; }
  .b-success { color: var(--success-400); background: rgba(34,197,94,0.12); border-color: rgba(34,197,94,0.28); }
  .b-warning { color: var(--warning-400); background: rgba(245,158,11,0.12); border-color: rgba(245,158,11,0.30); }
  .b-critical { color: var(--critical-400); background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.32); }
  .b-info { color: var(--info-400); background: rgba(59,130,246,0.14); border-color: rgba(59,130,246,0.32); }
  .b-neutral { color: var(--fg-2); background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.12); }
  .b-ai { color: var(--info-300); background: rgba(59,130,246,0.18); border-color: rgba(59,130,246,0.4); }

  .severity {
    font-family: var(--font-mono);
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 2px;
    display:inline-block;
    line-height: 1.4;
  }
  .sev-cat1 { color:#fff; background: var(--critical-600); }
  .sev-cat2 { color:#fff; background: var(--warning-600); }
  .sev-cat3 { color: var(--navy-900); background: var(--warning-300); }

  .chip {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    padding: 4px 8px;
    border-radius: 4px;
    border: 1px solid var(--stroke-2);
    color: var(--fg-2);
    background: var(--surface-1);
  }
</style></head>
<body>
<div class="card">
  <div class="head"><div class="h">Badges & Status</div><div class="sub">PILL FOR STATUS · TAG FOR SEVERITY</div></div>

  <div class="grp">
    <div class="label">ATO status (pill · dot indicator)</div>
    <div class="row">
      <span class="badge b-success">ATO active</span>
      <span class="badge b-warning">90-day window</span>
      <span class="badge b-warning" style="color:var(--warning-300); background:rgba(245,158,11,0.2);">60-day window</span>
      <span class="badge b-critical">30-day window</span>
      <span class="badge b-critical" style="background:rgba(239,68,68,0.2)">Expired</span>
      <span class="badge b-info">IATT</span>
      <span class="badge b-neutral">Not authorized</span>
    </div>
  </div>

  <div class="grp">
    <div class="label">POA&amp;M severity (tag · DISA cat)</div>
    <div class="row">
      <span class="severity sev-cat1">CAT I</span>
      <span class="severity sev-cat2">CAT II</span>
      <span class="severity sev-cat3">CAT III</span>
    </div>
  </div>

  <div class="grp">
    <div class="label">AI &amp; control chips</div>
    <div class="row">
      <span class="badge b-ai no-dot">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m12 3-1.9 5.8a2 2 0 0 1-1.3 1.3L3 12l5.8 1.9a2 2 0 0 1 1.3 1.3L12 21l1.9-5.8a2 2 0 0 1 1.3-1.3L21 12l-5.8-1.9a2 2 0 0 1-1.3-1.3L12 3Z"/></svg>
        AI-DRAFTED
      </span>
      <span class="chip">AC-2(3)</span>
      <span class="chip">CM-6</span>
      <span class="chip">SI-4(4)</span>
      <span class="chip">CVE-2026-0421</span>
    </div>
  </div>
</div>
</body></html>
