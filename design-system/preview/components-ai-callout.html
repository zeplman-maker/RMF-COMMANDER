<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="label-eyebrow" style="margin-bottom:12px;">AI governance — draft callout</div>
  <div style="border:1px solid #C4B5FD; background:#EDE9FE; border-radius:6px; padding:14px 16px;">
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px;">
      <div style="background:#6D28D9; color:#fff; padding:3px 8px; border-radius:3px; font-size:10px; font-weight:700; letter-spacing:0.1em; font-family:var(--font-mono);">AI-DRAFTED</div>
      <div style="font-size:11px; color:#4C1D95; letter-spacing:0.04em; font-weight:600;">REQUIRES HUMAN APPROVAL</div>
      <div style="margin-left:auto; font-size:11px; color:#6D28D9; font-family:var(--font-mono);">grounded · NIST SP 800-53 r5 · AC-12</div>
    </div>
    <div style="font-size:14px; color:#3B0764; line-height:1.5;">"The system terminates user sessions after 15 minutes of inactivity. Re-authentication via CAC/PIV-derived credential is required to resume the session."</div>
    <div style="display:flex; gap:8px; margin-top:12px;">
      <button style="font-family:var(--font-sans); font-weight:600; font-size:13px; padding:7px 14px; border-radius:4px; border:none; background:#1E2761; color:#fff;">Approve &amp; insert</button>
      <button style="font-family:var(--font-sans); font-weight:600; font-size:13px; padding:7px 14px; border-radius:4px; border:1px solid var(--slate-300); background:#fff; color:var(--mission-navy-900);">Edit draft</button>
      <button style="font-family:var(--font-sans); font-weight:600; font-size:13px; padding:7px 14px; border-radius:4px; border:none; background:transparent; color:var(--slate-700);">Discard</button>
    </div>
  </div>
</div></body></html>
