<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div style="display:grid; grid-template-columns: repeat(10, 1fr); gap:6px;">
    <div class="col"><div class="swatch" style="height:64px; background:#0B1220;"></div><div class="mono" style="font-size:10px; color:var(--slate-700);">950</div></div>
    <div class="col"><div class="swatch" style="height:64px; background:#111827;"></div><div class="mono" style="font-size:10px; color:var(--slate-700);">900</div></div>
    <div class="col"><div class="swatch" style="height:64px; background:#1F2937;"></div><div class="mono" style="font-size:10px; color:var(--slate-700);">800</div></div>
    <div class="col"><div class="swatch" style="height:64px; background:#334155;"></div><div class="mono" style="font-size:10px; color:var(--slate-700);">700</div></div>
    <div class="col"><div class="swatch" style="height:64px; background:#475569;"></div><div class="mono" style="font-size:10px; color:var(--slate-700);">600</div></div>
    <div class="col"><div class="swatch" style="height:64px; background:#64748B;"></div><div class="mono" style="font-size:10px; color:var(--slate-700);">500</div></div>
    <div class="col"><div class="swatch" style="height:64px; background:#94A3B8;"></div><div class="mono" style="font-size:10px; color:var(--slate-700);">400</div></div>
    <div class="col"><div class="swatch" style="height:64px; background:#CBD5E1;"></div><div class="mono" style="font-size:10px; color:var(--slate-700);">300</div></div>
    <div class="col"><div class="swatch" style="height:64px; background:#E2E8F0;"></div><div class="mono" style="font-size:10px; color:var(--slate-700);">200</div></div>
    <div class="col"><div class="swatch" style="height:64px; background:#F1F5F9;"></div><div class="mono" style="font-size:10px; color:var(--slate-700);">100</div></div>
  </div>
  <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:14px; margin-top:14px;">
    <div>
      <div class="label-eyebrow">Body text</div>
      <div style="font-size:14px; color:var(--slate-700); margin-top:6px;">slate-700 on white. The workhorse for paragraphs, table cells, and form labels.</div>
    </div>
    <div>
      <div class="label-eyebrow">Muted / meta</div>
      <div style="font-size:14px; color:var(--slate-500); margin-top:6px;">slate-500 for timestamps, captions, helper text under inputs.</div>
    </div>
    <div>
      <div class="label-eyebrow">Borders</div>
      <div style="font-size:14px; color:var(--slate-700); margin-top:6px;"><span style="display:inline-block; padding:6px 10px; border:1px solid var(--slate-300); border-radius:4px; background:#fff; font-family:var(--font-mono); font-size:11px;">slate-300 1px</span></div>
    </div>
  </div>
</div></body></html>
