<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div style="display:grid; grid-template-columns: repeat(6, 1fr); gap:10px;">
    <!-- Mission Navy ramp -->
    <div class="col">
      <div class="swatch" style="height:80px; background:#0F1A3D;"></div>
      <div class="mono" style="font-size:11px; color:var(--slate-800);">navy-950</div>
      <div class="mono" style="font-size:10px; color:var(--slate-500);">#0F1A3D</div>
    </div>
    <div class="col">
      <div class="swatch" style="height:80px; background:#1E2761;"></div>
      <div class="mono" style="font-size:11px; color:var(--slate-800);">navy-900</div>
      <div class="mono" style="font-size:10px; color:var(--slate-500);">#1E2761</div>
    </div>
    <div class="col">
      <div class="swatch" style="height:80px; background:#2E5FA3;"></div>
      <div class="mono" style="font-size:11px; color:var(--slate-800);">navy-700</div>
      <div class="mono" style="font-size:10px; color:var(--slate-500);">#2E5FA3</div>
    </div>
    <div class="col">
      <div class="swatch" style="height:80px; background:#3A7BD5;"></div>
      <div class="mono" style="font-size:11px; color:var(--slate-800);">navy-600</div>
      <div class="mono" style="font-size:10px; color:var(--slate-500);">#3A7BD5</div>
    </div>
    <div class="col">
      <div class="swatch" style="height:80px; background:#4A90D9;"></div>
      <div class="mono" style="font-size:11px; color:var(--slate-800);">cyber-500</div>
      <div class="mono" style="font-size:10px; color:var(--slate-500);">#4A90D9</div>
    </div>
    <div class="col">
      <div class="swatch" style="height:80px; background:#6FA8E6;"></div>
      <div class="mono" style="font-size:11px; color:var(--slate-800);">cyber-400</div>
      <div class="mono" style="font-size:10px; color:var(--slate-500);">#6FA8E6</div>
    </div>
  </div>
  <div style="display:grid; grid-template-columns: repeat(6, 1fr); gap:10px; margin-top:10px;">
    <div class="col">
      <div class="swatch" style="height:60px; background:#8A9FCC;"></div>
      <div class="mono" style="font-size:11px; color:var(--slate-800);">cyber-300</div>
    </div>
    <div class="col">
      <div class="swatch" style="height:60px; background:#CADCFC;"></div>
      <div class="mono" style="font-size:11px; color:var(--slate-800);">cyber-200</div>
    </div>
    <div class="col">
      <div class="swatch" style="height:60px; background:#EEF3FC;"></div>
      <div class="mono" style="font-size:11px; color:var(--slate-800);">cyber-100</div>
    </div>
    <div class="col">
      <div class="swatch" style="height:60px; background:#F8FAFF;"></div>
      <div class="mono" style="font-size:11px; color:var(--slate-800);">cyber-50</div>
    </div>
    <div class="col" style="grid-column: span 2; justify-content:center;">
      <div class="label-eyebrow">Brand spine</div>
      <div style="font-family:var(--font-display); font-size:14px; color:var(--mission-navy-900); line-height:1.3; font-weight:600;">Mission Navy &nbsp;+&nbsp; Cyber Blue.<br/>Used on chrome, CTAs, focus, data.</div>
    </div>
  </div>
</div></body></html>
