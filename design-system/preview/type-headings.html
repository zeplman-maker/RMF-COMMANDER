<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div style="display:grid; grid-template-columns: 110px 1fr; column-gap:18px; row-gap:8px; align-items:baseline;">
    <div class="mono" style="font-size:10px; color:var(--slate-500);">H1 · 36 · 700</div>
    <div style="font-family:var(--font-display); font-weight:700; font-size:36px; line-height:1.15; letter-spacing:-0.015em; color:var(--mission-navy-900);">Portfolio overview</div>

    <div class="mono" style="font-size:10px; color:var(--slate-500);">H2 · 30 · 700</div>
    <div style="font-family:var(--font-display); font-weight:700; font-size:30px; line-height:1.25; letter-spacing:-0.015em; color:var(--mission-navy-900);">26 systems · 1M+ users</div>

    <div class="mono" style="font-size:10px; color:var(--slate-500);">H3 · 20 · 600</div>
    <div style="font-family:var(--font-sans); font-weight:600; font-size:20px; line-height:1.3; color:var(--mission-navy-900);">Smart Alert Engine</div>

    <div class="mono" style="font-size:10px; color:var(--slate-500);">H4 · 16 · 600</div>
    <div style="font-family:var(--font-sans); font-weight:600; font-size:16px; color:var(--mission-navy-900);">90/60/30-day ATO windows</div>
  </div>
</div></body></html>
