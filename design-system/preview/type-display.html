<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .row { display:flex; align-items:baseline; gap:18px; padding:10px 0; border-bottom:1px solid var(--stroke-1); }
  .row:last-child { border-bottom:0; }
  .row .spec { font-family:var(--font-mono); font-size:10.5px; color:var(--fg-3); letter-spacing:.05em; text-transform:uppercase; min-width:120px; flex-shrink:0; }
  .row .sample { color:var(--fg-1); }
  .head { display:flex; align-items:baseline; gap:10px; margin-bottom:4px; }
  .head .h { font-weight:700; font-size:14px; color:var(--fg-1); }
  .head .sub { font-family:var(--font-mono); font-size:10.5px; color:var(--fg-3); letter-spacing:.06em; text-transform:uppercase; }
</style></head>
<body>
<div class="card">
  <div class="head"><div class="h">Display & Heading Scale</div><div class="sub">INTER · TIGHT TRACKING</div></div>
  <div class="row"><div class="spec">DISPLAY · 60 / 700</div><div class="sample" style="font:700 60px/1.05 Inter; letter-spacing:-0.011em">Portfolio</div></div>
  <div class="row"><div class="spec">H1 · 48 / 700</div><div class="sample" style="font:700 48px/1.05 Inter; letter-spacing:-0.011em">ATO Status</div></div>
  <div class="row"><div class="spec">H2 · 36 / 700</div><div class="sample" style="font:700 36px/1.1 Inter; letter-spacing:-0.011em">Risk Register</div></div>
  <div class="row"><div class="spec">H3 · 30 / 600</div><div class="sample" style="font:600 30px/1.15 Inter; letter-spacing:-0.011em">Smart Alert Engine</div></div>
  <div class="row"><div class="spec">H4 · 24 / 600</div><div class="sample" style="font:600 24px/1.15 Inter; letter-spacing:-0.005em">Control Statement</div></div>
  <div class="row"><div class="spec">H5 · 20 / 600</div><div class="sample" style="font:600 20px/1.2 Inter; letter-spacing:-0.005em">90-day Window</div></div>
</div>
</body></html>
