<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<script src="https://unpkg.com/lucide@0.460.0"></script>
</head>
<body><div class="card">
  <div class="label-eyebrow" style="margin-bottom:12px;">Iconography — Lucide line, 1.5px stroke</div>
  <div style="display:flex; gap:18px; flex-wrap:wrap; align-items:center; color:var(--slate-700);">
    <div style="display:flex; flex-direction:column; align-items:center; gap:4px; min-width:64px;"><i data-lucide="shield-check" style="width:28px; height:28px;"></i><span style="font-family:var(--font-mono); font-size:10px; color:var(--slate-500);">shield-check</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:4px; min-width:64px;"><i data-lucide="bell-ring" style="width:28px; height:28px;"></i><span style="font-family:var(--font-mono); font-size:10px; color:var(--slate-500);">bell-ring</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:4px; min-width:64px;"><i data-lucide="clipboard-check" style="width:28px; height:28px;"></i><span style="font-family:var(--font-mono); font-size:10px; color:var(--slate-500);">clipboard-check</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:4px; min-width:64px;"><i data-lucide="bar-chart-3" style="width:28px; height:28px;"></i><span style="font-family:var(--font-mono); font-size:10px; color:var(--slate-500);">bar-chart-3</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:4px; min-width:64px;"><i data-lucide="bot" style="width:28px; height:28px;"></i><span style="font-family:var(--font-mono); font-size:10px; color:var(--slate-500);">bot</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:4px; min-width:64px;"><i data-lucide="search" style="width:28px; height:28px;"></i><span style="font-family:var(--font-mono); font-size:10px; color:var(--slate-500);">search</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:4px; min-width:64px;"><i data-lucide="key-round" style="width:28px; height:28px;"></i><span style="font-family:var(--font-mono); font-size:10px; color:var(--slate-500);">key-round</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:4px; min-width:64px;"><i data-lucide="cloud" style="width:28px; height:28px;"></i><span style="font-family:var(--font-mono); font-size:10px; color:var(--slate-500);">cloud</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:4px; min-width:64px;"><i data-lucide="lock-keyhole" style="width:28px; height:28px;"></i><span style="font-family:var(--font-mono); font-size:10px; color:var(--slate-500);">lock-keyhole</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:4px; min-width:64px;"><i data-lucide="server" style="width:28px; height:28px;"></i><span style="font-family:var(--font-mono); font-size:10px; color:var(--slate-500);">server</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:4px; min-width:64px; color:var(--status-ok);"><i data-lucide="check-circle-2" style="width:28px; height:28px;"></i><span style="font-family:var(--font-mono); font-size:10px; color:var(--slate-500);">check (ok)</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:4px; min-width:64px; color:var(--status-warn);"><i data-lucide="triangle-alert" style="width:28px; height:28px;"></i><span style="font-family:var(--font-mono); font-size:10px; color:var(--slate-500);">alert (warn)</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:4px; min-width:64px; color:var(--status-crit);"><i data-lucide="octagon-alert" style="width:28px; height:28px;"></i><span style="font-family:var(--font-mono); font-size:10px; color:var(--slate-500);">crit</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:4px; min-width:64px;"><i data-lucide="file-text" style="width:28px; height:28px;"></i><span style="font-family:var(--font-mono); font-size:10px; color:var(--slate-500);">file-text</span></div>
  </div>
  <script>lucide.createIcons();</script>
</div></body></html>
