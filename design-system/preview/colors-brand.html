<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .ramp { display:grid; grid-template-columns: repeat(10, 1fr); gap: 0; border-radius: 10px; overflow: hidden; border: 1px solid var(--stroke-2); }
  .ramp .swatch { border: 0; border-radius: 0; min-height: 84px; padding: 8px 10px; }
  .ramp .name { font-size: 10px; }
  .ramp .hex { font-size: 9.5px; }
  .label-row { display:flex; align-items:baseline; gap:10px; }
  .label-row .h { font-family: var(--font-sans); font-weight:700; font-size:14px; letter-spacing:-0.005em; color:var(--fg-1); }
  .label-row .sub { font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-3); letter-spacing:.06em; text-transform:uppercase; }
</style></head>
<body>
<div class="card">
  <div class="label-row">
    <div class="h">Command Navy</div>
    <div class="sub">PRIMARY SURFACE · 50 → 950</div>
  </div>
  <div class="ramp">
    <div class="swatch" style="background:#E8ECF3;color:#0A1628"><div class="name">50</div><div class="hex">E8ECF3</div></div>
    <div class="swatch" style="background:#C9D2E0;color:#0A1628"><div class="name">100</div><div class="hex">C9D2E0</div></div>
    <div class="swatch" style="background:#93A3C0;color:#0A1628"><div class="name">200</div><div class="hex">93A3C0</div></div>
    <div class="swatch" style="background:#5D74A0;color:#fff"><div class="name">300</div><div class="hex">5D74A0</div></div>
    <div class="swatch" style="background:#344968;color:#fff"><div class="name">400</div><div class="hex">344968</div></div>
    <div class="swatch" style="background:#1F3357;color:#fff"><div class="name">500</div><div class="hex">1F3357</div></div>
    <div class="swatch" style="background:#152A47;color:#fff"><div class="name">600</div><div class="hex">152A47</div></div>
    <div class="swatch" style="background:#0F1F36;color:#fff"><div class="name">700</div><div class="hex">0F1F36</div></div>
    <div class="swatch" style="background:#0A1628;color:#fff"><div class="name">800</div><div class="hex">0A1628</div></div>
    <div class="swatch" style="background:#060E1C;color:#fff"><div class="name">900</div><div class="hex">060E1C</div></div>
  </div>
  <div class="label-row" style="margin-top:6px">
    <div class="h">Cyber Cyan</div>
    <div class="sub">HERO ACCENT · 50 → 900</div>
  </div>
  <div class="ramp">
    <div class="swatch" style="background:#ECFEFF;color:#0A1628"><div class="name">50</div><div class="hex">ECFEFF</div></div>
    <div class="swatch" style="background:#CFFAFE;color:#0A1628"><div class="name">100</div><div class="hex">CFFAFE</div></div>
    <div class="swatch" style="background:#A5F3FC;color:#0A1628"><div class="name">200</div><div class="hex">A5F3FC</div></div>
    <div class="swatch" style="background:#67E8F9;color:#0A1628"><div class="name">300</div><div class="hex">67E8F9</div></div>
    <div class="swatch" style="background:#22D3EE;color:#0A1628"><div class="name">400</div><div class="hex">22D3EE</div></div>
    <div class="swatch" style="background:#06B6D4;color:#0A1628"><div class="name">500</div><div class="hex">06B6D4</div></div>
    <div class="swatch" style="background:#0EA5C7;color:#fff"><div class="name">600</div><div class="hex">0EA5C7</div></div>
    <div class="swatch" style="background:#0E7C94;color:#fff"><div class="name">700</div><div class="hex">0E7C94</div></div>
    <div class="swatch" style="background:#155E73;color:#fff"><div class="name">800</div><div class="hex">155E73</div></div>
    <div class="swatch" style="background:#164E64;color:#fff"><div class="name">900</div><div class="hex">164E64</div></div>
  </div>
</div>
</body></html>
