<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="label-eyebrow" style="margin-bottom:14px;">Radii — restrained, purposeful</div>
  <div style="display:flex; gap:16px; align-items:flex-end;">
    <div class="col" style="align-items:center;"><div style="width:72px; height:72px; background:var(--cyber-blue-100); border:1px solid var(--cyber-blue-200); border-radius:0;"></div><div class="mono" style="font-size:11px; margin-top:8px;">none</div><div class="mono" style="font-size:10px; color:var(--slate-500);">banners</div></div>
    <div class="col" style="align-items:center;"><div style="width:72px; height:72px; background:var(--cyber-blue-100); border:1px solid var(--cyber-blue-200); border-radius:2px;"></div><div class="mono" style="font-size:11px; margin-top:8px;">sm · 2</div><div class="mono" style="font-size:10px; color:var(--slate-500);">inputs</div></div>
    <div class="col" style="align-items:center;"><div style="width:72px; height:72px; background:var(--cyber-blue-100); border:1px solid var(--cyber-blue-200); border-radius:4px;"></div><div class="mono" style="font-size:11px; margin-top:8px;">md · 4</div><div class="mono" style="font-size:10px; color:var(--slate-500);">buttons</div></div>
    <div class="col" style="align-items:center;"><div style="width:72px; height:72px; background:var(--cyber-blue-100); border:1px solid var(--cyber-blue-200); border-radius:6px;"></div><div class="mono" style="font-size:11px; margin-top:8px;">lg · 6</div><div class="mono" style="font-size:10px; color:var(--slate-500);">cards</div></div>
    <div class="col" style="align-items:center;"><div style="width:72px; height:72px; background:var(--cyber-blue-100); border:1px solid var(--cyber-blue-200); border-radius:10px;"></div><div class="mono" style="font-size:11px; margin-top:8px;">xl · 10</div><div class="mono" style="font-size:10px; color:var(--slate-500);">modals</div></div>
    <div class="col" style="align-items:center;"><div style="width:72px; height:36px; background:var(--cyber-blue-100); border:1px solid var(--cyber-blue-200); border-radius:9999px; align-self:center;"></div><div class="mono" style="font-size:11px; margin-top:8px;">full</div><div class="mono" style="font-size:10px; color:var(--slate-500);">status pills</div></div>
  </div>
</div></body></html>
